name: CD

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.3"
          cache-dependency-path: |
            services/core/go.sum
            services/optimization/go.sum
            services/ordering/go.sum
            proto/go.sum

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bootstrap ML test environment
        run: |
          python -m venv services/ml/.venv
          make -C services/ml install

      - name: Run unit tests
        run: make test-unit

      - name: Run integration tests
        run: make test-integration

      - name: Run ML tests
        run: make test-ml

  build:
    runs-on: ubuntu-latest
    needs: verify
    outputs:
      image_registry: ${{ steps.meta.outputs.image_registry }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      core_digest: ${{ steps.push_core.outputs.digest }}
      optimization_digest: ${{ steps.push_optimization.outputs.digest }}
      ordering_digest: ${{ steps.push_ordering.outputs.digest }}
      ml_digest: ${{ steps.push_ml.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deployment metadata
        id: meta
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "image_registry=ghcr.io/${owner}/foodsea-backend" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push core
        id: push_core
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/core/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_registry }}/core-service:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_registry }}/core-service:dev

      - name: Build and push optimization
        id: push_optimization
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/optimization/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_registry }}/optimization-service:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_registry }}/optimization-service:dev

      - name: Build and push ordering
        id: push_ordering
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/ordering/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_registry }}/ordering-service:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_registry }}/ordering-service:dev

      - name: Build and push ml
        id: push_ml
        uses: docker/build-push-action@v6
        with:
          context: services/ml
          file: services/ml/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_registry }}/ml-service:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_registry }}/ml-service:dev

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: dev
    steps:
      - name: Deploy over SSH (dev only)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT || 22 }}
          command_timeout: 30m
          script_stop: true
          script: |
            set -euo pipefail

            REPO_DIR="/opt/foodsea/backend-dev"
            if [[ "${REPO_DIR}" != "/opt/foodsea/backend-dev" ]]; then
              echo "unexpected deploy path: ${REPO_DIR}" >&2
              exit 1
            fi

            REPO_URL="https://github.com/${{ github.repository }}.git"
            REPO_READ_TOKEN="${{ secrets.REPO_READ_TOKEN }}"
            if [ -n "${REPO_READ_TOKEN}" ]; then
              REPO_URL="https://x-access-token:${REPO_READ_TOKEN}@github.com/${{ github.repository }}.git"
            fi

            sudo install -d -o "$USER" -g "$USER" "${REPO_DIR}"
            if [ ! -d "${REPO_DIR}/.git" ]; then
              git clone "${REPO_URL}" "${REPO_DIR}"
            fi

            rm -f "${REPO_DIR}/.git/index.lock"
            cd "${REPO_DIR}"
            git remote set-url origin "${REPO_URL}"
            git fetch origin "${{ github.sha }}"
            git checkout --force "${{ github.sha }}"

            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            export FOODSEA_ENV="dev"
            export FOODSEA_HOST="${{ secrets.DEV_HOST }}"
            export IMAGE_REGISTRY="${{ needs.build.outputs.image_registry }}"
            export IMAGE_TAG="${{ needs.build.outputs.image_tag }}"
            export RELEASE_SHA="${{ github.sha }}"
            export RELEASE_NAMESPACE="foodsea-dev"
            export IMAGE_DIGEST_CORE="${{ needs.build.outputs.core_digest }}"
            export IMAGE_DIGEST_OPTIMIZATION="${{ needs.build.outputs.optimization_digest }}"
            export IMAGE_DIGEST_ORDERING="${{ needs.build.outputs.ordering_digest }}"
            export IMAGE_DIGEST_ML="${{ needs.build.outputs.ml_digest }}"
            export REGISTRY_SERVER="ghcr.io"
            export REGISTRY_USERNAME="${{ github.actor }}"
            export REGISTRY_PASSWORD="${{ secrets.GHCR_READ_TOKEN }}"
            export CORE_DB_PASSWORD="${{ secrets.CORE_DB_PASSWORD }}"
            export OPTIMIZATION_DB_PASSWORD="${{ secrets.OPTIMIZATION_DB_PASSWORD }}"
            export ORDERING_DB_PASSWORD="${{ secrets.ORDERING_DB_PASSWORD }}"
            export JWT_SECRET="${{ secrets.JWT_SECRET }}"
            export MINIO_ROOT_USER="${{ secrets.MINIO_ROOT_USER }}"
            export MINIO_ROOT_PASSWORD="${{ secrets.MINIO_ROOT_PASSWORD }}"
            export GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"

            deploy/scripts/deploy-k8s.sh

      - name: Run tests on VM (dev)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT || 22 }}
          command_timeout: 30m
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/foodsea/backend-dev
            git rev-parse HEAD

            python3 -m venv services/ml/.venv
            services/ml/.venv/bin/python -m pip install -U pip "setuptools>=68,<82" wheel
            services/ml/.venv/bin/python -m pip install -r services/ml/requirements-runtime.txt pytest==8.2.2
            services/ml/.venv/bin/python -m pip install -e services/ml --no-deps
            # test-swagger-regression expects local dev stack tooling (atlas/docker-compose),
            # so on VM we run full Go+ML suites and validate HTTP endpoints separately below.
            make test-go-all test-ml

            check_code() {
              local expected="$1"
              local actual="$2"
              local name="$3"
              if [[ "${actual}" != "${expected}" ]]; then
                echo "endpoint check failed: ${name} expected=${expected} actual=${actual}" >&2
                exit 1
              fi
              echo "endpoint check passed: ${name} status=${actual}"
            }

            host="${{ secrets.DEV_HOST }}"
            base="http://127.0.0.1"

            code=$(curl -s -o /dev/null -w '%{http_code}' -H "Host: ${host}" "${base}/api/v1/categories")
            check_code 200 "${code}" "GET /api/v1/categories"

            code=$(curl -s -o /dev/null -w '%{http_code}' -H "Host: ${host}" "${base}/api/v1/search?q=milk")
            check_code 200 "${code}" "GET /api/v1/search"

            code=$(curl -s -o /dev/null -w '%{http_code}' -H "Host: ${host}" "${base}/api/v1/orders")
            check_code 401 "${code}" "GET /api/v1/orders without token"

            code=$(curl -s -o /dev/null -w '%{http_code}' -H "Host: ${host}" -H 'Content-Type: application/json' \
              -X POST "${base}/api/v1/voice/parse" --data '{"text":"молоко"}')
            check_code 401 "${code}" "POST /api/v1/voice/parse without token"

            code=$(curl -s -o /dev/null -w '%{http_code}' -H "Host: ${host}" \
              -X POST "${base}/api/v1/products/photo-search")
            check_code 401 "${code}" "POST /api/v1/products/photo-search without token"

      - name: Release traceability summary
        run: |
          {
            echo "## Deploy Report (dev)"
            echo "- commit_sha: \`${{ github.sha }}\`"
            echo "- namespace: \`foodsea-dev\`"
            echo "- image_tag: \`${{ needs.build.outputs.image_tag }}\`"
            echo "- core_digest: \`${{ needs.build.outputs.core_digest }}\`"
            echo "- optimization_digest: \`${{ needs.build.outputs.optimization_digest }}\`"
            echo "- ordering_digest: \`${{ needs.build.outputs.ordering_digest }}\`"
            echo "- ml_digest: \`${{ needs.build.outputs.ml_digest }}\`"
            echo "- smoke_check: \`passed\`"
          } >> "$GITHUB_STEP_SUMMARY"
