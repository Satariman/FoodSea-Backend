name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

jobs:
  test-and-render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.3"
          cache-dependency-path: |
            services/core/go.sum
            services/optimization/go.sum
            services/ordering/go.sum
            proto/go.sum

      - name: Go unit tests
        run: make test-unit

      - name: Render dev manifests
        run: kubectl kustomize deploy/k8s/overlays/dev >/tmp/foodsea-dev.yaml

      - name: Render prod manifests
        run: kubectl kustomize deploy/k8s/overlays/prod >/tmp/foodsea-prod.yaml

      - name: Build service images
        run: |
          docker build -f services/core/Dockerfile -t foodsea/core-service:ci .
          docker build -f services/optimization/Dockerfile -t foodsea/optimization-service:ci .
          docker build -f services/ordering/Dockerfile -t foodsea/ordering-service:ci .
          docker build -f services/ml/Dockerfile -t foodsea/ml-service:ci services/ml
