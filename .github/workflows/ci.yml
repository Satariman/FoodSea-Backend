name: CI

on:
  pull_request:
  push:
    branches:
      - develop

jobs:
  test-render-build-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.3"
          cache-dependency-path: |
            services/core/go.sum
            services/optimization/go.sum
            services/ordering/go.sum
            proto/go.sum

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bootstrap ML test environment
        run: |
          python -m venv services/ml/.venv
          make -C services/ml install

      - name: Go unit tests
        run: make test-unit

      - name: Go integration tests
        run: make test-integration

      - name: ML tests
        run: make test-ml

      - name: Render dev manifests
        run: kubectl kustomize deploy/k8s/overlays/dev >/tmp/foodsea-dev.yaml

      - name: Build service images
        run: |
          docker build -f services/core/Dockerfile -t foodsea/core-service:ci .
          docker build -f services/optimization/Dockerfile -t foodsea/optimization-service:ci .
          docker build -f services/ordering/Dockerfile -t foodsea/ordering-service:ci .
          docker build -f services/ml/Dockerfile -t foodsea/ml-service:ci services/ml

      - name: Trivy scan core image
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: foodsea/core-service:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Trivy scan optimization image
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: foodsea/optimization-service:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Trivy scan ordering image
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: foodsea/ordering-service:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Trivy scan ml image
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          image-ref: foodsea/ml-service:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
