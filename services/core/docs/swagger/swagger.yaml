        type: string
    type: object
  internal_modules_identity_handler.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      onboarding_done:
        type: boolean
      phone:
        type: string
      updated_at:
        type: string
    type: object
  internal_modules_images_interfaces.imageURLResponse:
    properties:
      image_url:
        type: string
    type: object
  internal_modules_partners_handler.OfferResponse:
    properties:
      discount_percent:
        type: integer
      in_stock:
        type: boolean
      original_price_kopecks:
        type: integer
      price_kopecks:
