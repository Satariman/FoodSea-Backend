  internal_modules_cart_handler.CartItemResponse:
    properties:
      added_at:
        type: string
      product_id:
        type: string
      product_name:
        type: string
      quantity:
        type: integer
    type: object
  internal_modules_cart_handler.CartResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/internal_modules_cart_handler.CartItemResponse'
        type: array
    type: object
  internal_modules_cart_handler.UpdateItemRequest:
    properties:
      quantity:
        maximum: 99
        minimum: 1
        type: integer
    required:
    - quantity
    type: object
  internal_modules_catalog_handler.BestOfferResponse:
    properties:
      discount_percent:
        type: integer
      original_price_kopecks:
        type: integer
      price_kopecks:
        type: integer
      store_name:
        type: string
      store_slug:
        type: string
    type: object
  internal_modules_catalog_handler.BrandBriefResponse:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  internal_modules_catalog_handler.BrandResponse:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  internal_modules_catalog_handler.CategoryBriefResponse:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  internal_modules_catalog_handler.CategoryResponse:
    properties:
      children:
        items:
          $ref: '#/definitions/internal_modules_catalog_handler.CategoryResponse'
        type: array
      id:
        type: string
      name:
        type: string
      slug:
        type: string
      sort_order:
        type: integer
    type: object
  internal_modules_catalog_handler.NutritionResponse:
    properties:
      calories:
        type: number
      carbohydrates:
        type: number
      fat:
        type: number
      protein:
        type: number
    type: object
  internal_modules_catalog_handler.ProductBriefResponse:
    properties:
      id:
        type: string
      image_url:
        type: string
      in_stock:
        type: boolean
      max_discount_percent:
        type: integer
      min_price_kopecks:
        type: integer
      name:
        type: string
      weight:
        type: string
    type: object
  internal_modules_catalog_handler.ProductDetailResponse:
    properties:
      barcode:
        type: string
      best_offer:
        $ref: '#/definitions/internal_modules_catalog_handler.BestOfferResponse'
      brand:
        $ref: '#/definitions/internal_modules_catalog_handler.BrandBriefResponse'
      category:
        $ref: '#/definitions/internal_modules_catalog_handler.CategoryBriefResponse'
      composition:
        type: string
      description:
        type: string
      id:
        type: string
      image_url:
        type: string
      in_stock:
        type: boolean
      name:
        type: string
      nutrition:
        $ref: '#/definitions/internal_modules_catalog_handler.NutritionResponse'
      subcategory:
        $ref: '#/definitions/internal_modules_catalog_handler.CategoryBriefResponse'
      weight:
        type: string
    type: object
  internal_modules_identity_handler.AuthResponse:
    properties:
      access_expires_at:
        type: string
      access_token:
        type: string
      refresh_expires_at:
        type: string
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/internal_modules_identity_handler.UserResponse'
    type: object
  internal_modules_identity_handler.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
      phone:
        type: string
