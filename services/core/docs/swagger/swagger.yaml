    - refresh_token
    type: object
  internal_modules_identity_handler.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
      phone:
        type: string
    required:
    - password
    type: object
  internal_modules_identity_handler.TokenPairResponse:
    properties:
      access_expires_at:
        type: string
      access_token:
        type: string
      refresh_expires_at:
        type: string
