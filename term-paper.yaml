    english_name: FoodSea
    code: "05-04"
    summary: IOS-ПРИЛОЖЕНИЕ ОПТИМИЗАТОР ПРОДУКТОВОЙ КОРЗИНЫ — программная система для ведения продуктового каталога, управления корзиной, авторизации пользователей, расчета оптимального состава покупки, поиска товаров по фотографии и оформления заказов.
