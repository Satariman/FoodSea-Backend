apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: core-postgres
  namespace: foodsea
spec:
  serviceName: core-postgres
  replicas: 1
  selector:
    matchLabels:
      app: core-postgres
  template:
    metadata:
      labels:
        app: core-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: core_db
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: core-secrets
              key: DB_PASSWORD
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "postgres"]
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: core-postgres
  namespace: foodsea
spec:
  selector:
    app: core-postgres
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None
