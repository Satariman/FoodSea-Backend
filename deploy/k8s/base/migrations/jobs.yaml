apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-core
  labels:
    app.kubernetes.io/name: migrate-core
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 8
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: atlas
          image: arigaio/atlas:latest
          command: ["/atlas", "migrate", "apply", "--dir", "file:///migrations", "--url", "$(DB_URL)"]
          envFrom:
            - secretRef:
                name: core-secrets
          volumeMounts:
            - name: migrations
              mountPath: /migrations
      volumes:
        - name: migrations
          configMap:
            name: core-migrations
---
