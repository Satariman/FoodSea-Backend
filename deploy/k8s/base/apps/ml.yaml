apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  labels:
    app.kubernetes.io/name: ml-service
    app.kubernetes.io/component: grpc
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ml-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ml-service
        app.kubernetes.io/component: grpc
    spec:
      imagePullSecrets:
        - name: registry-credentials
      containers:
        - name: ml
          image: ml-service:latest
          env:
            - name: GRPC_PORT
              value: "50051"
            - name: CORE_GRPC_ADDR
              value: core-service:9091
            - name: TEXT_WEIGHT
              value: "0.9"
            - name: CATEGORY_WEIGHT
              value: "5.0"
            - name: NUTRITION_WEIGHT
              value: "0.5"
            - name: PRICE_WEIGHT
              value: "10.0"
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gemini-api-key
                  key: api-key
            - name: GEMINI_MODEL
              value: gemini-embedding-2
            - name: GEMINI_OUTPUT_DIM
              value: "768"
            - name: VOICE_INDEX_PATH
              value: /app/data/voice_index.pkl
            - name: VOICE_MIN_NGRAM_SCORE
              value: "0.7"
            - name: VOICE_MAX_NGRAM_LEN
              value: "3"
            - name: VOICE_EMBEDDING_CACHE_SIZE
              value: "10000"
          ports:
            - containerPort: 50051
              name: grpc
          volumeMounts:
            - name: ml-data
              mountPath: /app/data
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 192Mi
      volumes:
        - name: ml-data
          persistentVolumeClaim:
            claimName: ml-service-data
---
apiVersion: v1
kind: Service
metadata:
  name: ml-service
  labels:
    app.kubernetes.io/name: ml-service
spec:
  selector:
    app.kubernetes.io/name: ml-service
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ml-service-data
  labels:
    app.kubernetes.io/name: ml-service
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
