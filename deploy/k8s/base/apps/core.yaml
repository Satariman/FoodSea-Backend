apiVersion: v1
kind: ConfigMap
metadata:
  name: core-config
data:
  ENV: production
  SERVER_PORT: "8081"
  GRPC_PORT: "9091"
  REDIS_URL: redis://redis:6379/0
  KAFKA_BROKERS: kafka:9092
  JWT_ACCESS_TTL: 15m
  JWT_REFRESH_TTL: 720h
  S3_ENDPOINT: minio:9000
  S3_BUCKET_NAME: product-images
  S3_USE_SSL: "false"
  S3_PUBLIC_BASE_URL: http://foodsea.local/product-images
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-service
  labels:
    app.kubernetes.io/name: core-service
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: core-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: core-service
        app.kubernetes.io/component: api
    spec:
      imagePullSecrets:
        - name: registry-credentials
      containers:
        - name: core
          image: core-service:latest
          ports:
            - containerPort: 8081
              name: http
            - containerPort: 9091
              name: grpc
          envFrom:
            - configMapRef:
                name: core-config
            - secretRef:
                name: core-secrets
          env:
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio-secrets
                  key: MINIO_ROOT_USER
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secrets
                  key: MINIO_ROOT_PASSWORD
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: core-service
  labels:
    app.kubernetes.io/name: core-service
spec:
  selector:
    app.kubernetes.io/name: core-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
    - name: grpc
      port: 9091
      targetPort: 9091
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: core-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: core-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
