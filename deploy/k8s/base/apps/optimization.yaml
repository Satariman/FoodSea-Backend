apiVersion: v1
kind: ConfigMap
metadata:
  name: optimization-config
data:
  ENV: production
  SERVER_PORT: "8082"
  GRPC_PORT: "9092"
  REDIS_URL: redis://redis:6379/1
  KAFKA_BROKERS: kafka:9092
  CORE_GRPC_ADDR: core-service:9091
  ML_GRPC_ADDR: ml-service:50051
  OPTIMIZATION_TIMEOUT: 30s
  RESULT_TTL: 24h
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: optimization-service
  labels:
    app.kubernetes.io/name: optimization-service
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: optimization-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: optimization-service
        app.kubernetes.io/component: api
    spec:
      imagePullSecrets:
        - name: registry-credentials
      containers:
        - name: optimization
          image: optimization-service:latest
          ports:
            - containerPort: 8082
              name: http
            - containerPort: 9092
              name: grpc
          envFrom:
            - configMapRef:
                name: optimization-config
            - secretRef:
                name: optimization-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: optimization-service
  labels:
    app.kubernetes.io/name: optimization-service
spec:
  selector:
    app.kubernetes.io/name: optimization-service
  ports:
    - name: http
      port: 8082
      targetPort: 8082
    - name: grpc
      port: 9092
      targetPort: 9092
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: optimization-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: optimization-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
