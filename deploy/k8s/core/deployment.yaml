apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-service
  namespace: foodsea
spec:
  replicas: 2
  selector:
    matchLabels:
      app: core-service
  template:
    metadata:
      labels:
        app: core-service
    spec:
      containers:
      - name: core
        image: foodsea/core-service:latest
        ports:
        - containerPort: 8081
          name: http
        - containerPort: 9091
          name: grpc
        envFrom:
        - configMapRef:
            name: core-config
        - secretRef:
            name: core-secrets
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
