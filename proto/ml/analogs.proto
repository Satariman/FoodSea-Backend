syntax = "proto3";
package ml;
option go_package = "github.com/foodsea/proto/ml";

service AnalogService {
    rpc GetAnalogs(GetAnalogsRequest) returns (GetAnalogsResponse);
    rpc GetBatchAnalogs(GetBatchAnalogsRequest) returns (GetBatchAnalogsResponse);
}

message GetAnalogsRequest {
    string product_id = 1;
    int32 top_k = 2;
    // If true, penalize analogs that are more expensive than the source product.
    bool price_aware = 3;
    // If not empty, only return analogs that are available in these stores.
    repeated string filter_store_ids = 4;
}

message GetAnalogsResponse {
    repeated AnalogProto analogs = 1;
}

message AnalogProto {
    string product_id = 1;
    string product_name = 2;
    double score = 3;
    int64 min_price_kopecks = 4;
}

message GetBatchAnalogsRequest {
    repeated string product_ids = 1;
    int32 top_k = 2;
    // Optional store filter for optimization flow.
    repeated string filter_store_ids = 3;
}

message GetBatchAnalogsResponse {
    map<string, AnalogList> analogs_by_product = 1;
}

message AnalogList {
    repeated AnalogProto analogs = 1;
}
