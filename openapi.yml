openapi: 3.0.0
info:
  title: FoodSea Unified API
  description: Unified REST API for core, optimization, and ordering services
    behind ingress.
  version: 1.0.0
paths:
  "/admin/products/{id}/image":
    post:
      description: 'Uploads an image for the product (multipart/form-data, field
        "image"). Max 5 MB. Allowed: image/jpeg, image/png, image/webp.'
      tags:
        - Admin
      summary: Upload product image
      parameters:
        - description: Product UUID
          name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  description: Image file
                  type: string
                  format: binary
              required:
                - image
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                      Response"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/internal_modules_images_interfaces.imageURLResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
        "422":
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
    delete:
      description: Removes the image associated with the product
      tags:
        - Admin
      summary: Delete product image
      parameters:
        - description: Product UUID
          name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
  /auth/login:
    post:
      description: Authenticates a user and returns JWT tokens
      tags:
        - auth
      summary: Login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/internal_modules_identity_handler.LoginRequest"
        description: Login credentials
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                      Response"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/internal_modules_identity_handler.AuthResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
  /auth/logout:
    post:
      security:
        - BearerAuth: []
      description: Revokes all refresh tokens for the current user
      tags:
        - auth
      summary: Logout
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
  /auth/refresh:
    post:
      description: Exchanges a valid refresh token for a new token pair
      tags:
        - auth
      summary: Refresh tokens
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/internal_modules_identity_handler.RefreshRequest"
        description: Refresh token
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                      Response"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/internal_modules_identity_handler.TokenPairResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
  /auth/register:
    post:
      description: Creates a new user account with phone or email and returns JWT tokens
      tags:
        - auth
      summary: Register a new user
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/internal_modules_identity_handler.RegisterRequest"
        description: Registration credentials
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                      Response"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/internal_modules_identity_handler.AuthResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
  "/barcode/{code}":
    get:
      description: Возвращает карточку товара по его штрихкоду (EAN-8 или EAN-13)
      tags:
        - Barcode
      summary: Получить товар по штрихкоду
      parameters:
        - description: Штрихкод (8 или 13 цифр)
          name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                      Response"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/github_com_foodsea_core_internal_modules_catalog_ha\
                          ndler.ProductDetailResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                      Response"
                  - type: object
                    properties:
                      error:
                        type: string
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                      Response"
                  - type: object
                    properties:
                      error:
                        type: string
  /brands:
    get:
      description: Returns all brands for use on the filter screen
      tags:
        - Brands
      summary: List brands
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                      Response"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/internal_modules_catalog_handler.BrandResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
  /cart:
    get:
      security:
        - BearerAuth: []
      description: Returns the authenticated user's cart with all items
      tags:
        - Cart
      summary: Get current cart
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                      Response"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/internal_modules_cart_handler.CartResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
    delete:
      security:
        - BearerAuth: []
      description: Removes all items from the authenticated user's cart
      tags:
        - Cart
      summary: Clear cart
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
  /cart/items:
    post:
      security:
        - BearerAuth: []
      description: Adds a product to the cart; increments quantity if already present
      tags:
        - Cart
      summary: Add item to cart
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/internal_modules_cart_handler.AddItemRequest"
        description: Add item request
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                      Response"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/internal_modules_cart_handler.CartResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
        "422":
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
  "/cart/items/{product_id}":
    put:
      security:
        - BearerAuth: []
      description: Sets a new quantity for the given product in the cart
      tags:
        - Cart
      summary: Update item quantity
      parameters:
        - description: Product UUID
          name: product_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/internal_modules_cart_handler.UpdateItemRequest"
        description: Update quantity
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                      Response"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/internal_modules_cart_handler.CartResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
        "422":
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
    delete:
      security:
        - BearerAuth: []
      description: Removes a product from the cart (idempotent)
      tags:
        - Cart
      summary: Remove item from cart
      parameters:
        - description: Product UUID
          name: product_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
  /categories:
    get:
      description: Returns the full two-level category tree
      tags:
        - Categories
      summary: List categories
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                      Response"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/internal_modules_catalog_handler.CategoryResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
  /products:
    get:
      description: Returns a paginated list of products with optional filters
      tags:
        - Products
      summary: List products
      parameters:
        - description: Category UUID
          name: category_id
          in: query
          schema:
            type: string
        - description: Subcategory UUID
          name: subcategory_id
          in: query
          schema:
            type: string
        - description: Brand UUID
          name: brand_id
          in: query
          schema:
            type: string
        - description: Only in-stock products
          name: in_stock
          in: query
          schema:
            type: boolean
        - description: Page number (default 1)
          name: page
          in: query
          schema:
            type: integer
        - description: Page size (default 20, max 100)
          name: page_size
          in: query
          schema:
            type: integer
        - description: "Sort: name_asc | name_desc | created_desc"
          name: sort
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                      Response"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/internal_modules_catalog_handler.ProductBriefRespon\
                            se"
                      meta:
                        $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                          Meta"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
  "/products/barcode/{code}":
    get:
      description: Looks up a product by EAN-8 or EAN-13 barcode
      tags:
        - Products
      summary: Get product by barcode
      parameters:
        - description: EAN-8 or EAN-13 barcode
          name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                      Response"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/internal_modules_catalog_handler.ProductDetailRespo\
                          nse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
  "/products/{id}":
    get:
      description: Returns the full product card including KBJU and related entities
      tags:
        - Products
      summary: Get product by ID
      parameters:
        - description: Product UUID
          name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                      Response"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/internal_modules_catalog_handler.ProductDetailRespo\
                          nse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
  "/products/{id}/offers":
    get:
      description: Returns all partner store offers for a given product, sorted by
        price (UC-07 compare prices)
      tags:
        - Partners
      summary: Get offers for a product
      parameters:
        - description: Product UUID
          name: id
          in: path
          required: true
          schema:
            type: string
        - description: Return only offers with a discount
          name: has_discount
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                      Response"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/internal_modules_partners_handler.OfferResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
  /search:
    get:
      description: Full-text search over products with filters, sorting, and pagination
      tags:
        - Search
      summary: Search products
      parameters:
        - description: Search query (min 2 chars)
          name: q
          in: query
          required: true
          schema:
            type: string
        - description: Category UUID
          name: category_id
          in: query
          schema:
            type: string
        - description: Subcategory UUID
          name: subcategory_id
          in: query
          schema:
            type: string
        - description: Brand UUID
          name: brand_id
          in: query
          schema:
            type: string
        - description: Store UUID — limits min_price and offers_count to this store
          name: store_id
          in: query
          schema:
            type: string
        - description: Minimum price in kopecks
          name: min_price
          in: query
          schema:
            type: integer
        - description: Maximum price in kopecks
          name: max_price
          in: query
          schema:
            type: integer
        - description: Only in-stock products
          name: in_stock
          in: query
          schema:
            type: boolean
        - description: Only products with at least one discounted offer
          name: has_discount
          in: query
          schema:
            type: boolean
        - description: "Sort: relevance | price_asc | price_desc | name_asc | name_desc |
            discount_desc"
          name: sort
          in: query
          schema:
            type: string
        - description: Page number (default 1)
          name: page
          in: query
          schema:
            type: integer
        - description: Page size (default 20, max 100)
          name: page_size
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                      Response"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/internal_modules_search_handler.SearchResultItemRes\
                            ponse"
                      meta:
                        $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                          Meta"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
  /stores:
    get:
      description: Returns all active partner stores sorted by name
      tags:
        - Partners
      summary: List partner stores
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                      Response"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/internal_modules_partners_handler.StoreResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
  /users/me:
    get:
      security:
        - BearerAuth: []
      description: Returns the authenticated user's profile
      tags:
        - users
      summary: Get current user profile
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                      Response"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/internal_modules_identity_handler.UserResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/github_com_foodsea_core_internal_platform_httputil.\
                  Response"
  /users/me/onboarding:
    post:
      security:
        - BearerAuth: []
